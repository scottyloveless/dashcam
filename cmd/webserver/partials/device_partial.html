<div class="device-grid">
		<div class="list-item"><h4>Name</h4></div>
		<div class="list-item"><h4>Packet Loss</h4></div>
		<div class="list-item"><h4>RTT</h4></div>
	{{range .}}
		<div class="list-item">{{.Device.Nickname}}</div>
		<div class="list-item">{{.PacketLoss}}%</div>
		<div class="list-item">{{.RTTavg}}ms</div>
    {{end}}
</div>
