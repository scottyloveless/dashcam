<!DOCTYPE html>
<html>
<head>
	<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
	<link rel="stylesheet" href="/static/styles.css">
</head>
<html>
<body>
    <div class="topbar">
        <span class="topbar-title">dashcam</span>
        <form action="/logout" method="POST">
            <button type="submit" class="logout-button">logout</button>
        </form>
    </div>
    <div class="main-layout">
        <div class="locations-panel">
            <div class="grid-container">
                {{range .Locations}}
                <div class="column-item">
                    <h3>{{.}}</h3>
                    <div id="devices-{{.}}"
                        hx-get="/device_partial?location={{.}}" 
                        hx-trigger="every 5s" 
                        hx-swap="innerHTML">
                    </div>
                </div>
                {{end}}
            </div>
        </div>
		<div class="alerts-panel column-item">
    		<h3>Active Alerts</h3>
    		<div hx-get="/alerts_partial"
        	 	hx-trigger="every 5s"
        	 	hx-swap="innerHTML">
    		</div>
        </div>
    </div>
    <div
    id="external-alerts-container"
    hx-get="/partials/external_alerts_partial"
    hx-trigger="load, every 5s"
    hx-swap="innerHTML">
    <!-- rendered by the partial handler -->
    </div>
</body>
</html>
